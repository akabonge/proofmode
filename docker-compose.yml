services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: proofmode
      POSTGRES_PASSWORD: proofmode
      POSTGRES_DB: proofmode
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proofmode -d proofmode"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build: ./api
    environment:
      DATABASE_URL: postgresql+psycopg://proofmode:proofmode@db:5432/proofmode
      APP_SECRET: change-this-secret
      FERNET_KEY: kRwfOp6c8kaGwU1JgUlpRfKKJvAGXYUZaOVPd_AUnNI=
      CORS_ORIGINS: http://localhost:3001,http://localhost:3000
      COOKIE_SECURE: "false"
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./web
      args:
        NEXT_PUBLIC_API_BASE: http://localhost:8001
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8001
    ports:
      - "3001:3000"
    depends_on:
      - api

volumes:
  db_data: